header:
  version: 11

machine: freiheit93
distro: security-training
target:
  - security-training-image
  - security-training-image:do_populate_sdk

repos:
  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: "2.8"
    layers:
      .: disabled

  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: scarthgap
    layers:
      meta:

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded"
    branch: scarthgap
    layers:
      meta-oe:
      meta-networking:
      meta-python:

  meta-clang:
    url: "https://github.com/kraj/meta-clang"
    branch: scarthgap
    layers:
      .:

  meta-arm:
    url: "https://git.yoctoproject.org/meta-arm"
    branch: scarthgap
    layers:
      meta-arm-toolchain:
      meta-arm:

  meta-selinux:
    url: "https://git.yoctoproject.org/meta-selinux"
    branch: scarthgap
    layers:
      .:

  meta-rauc:
    url: "https://github.com/rauc/meta-rauc"
    branch: scarthgap
    layers:
      .:

  # We unfortunately need it for the imx-secure-enclave recipe
  meta-freescale:
    url: "https://github.com/Freescale/meta-freescale.git"
    branch: scarthgap
    layers:
      .:

  meta-kiss:
    url: "https://github.com/bootlin/simplest-yocto-setup"
    branch: main
    layers:
      meta-kiss:

  meta-security-training:
    layers:
      meta-security-training:

local_conf_header:
  meta-kiss: |
    # Some useful lines you may want to copy to your site.conf for development
    EXTRA_IMAGE_FEATURES += "empty-root-password \
                             allow-empty-password \
                             allow-root-login \
                             "
    LICENSE_FLAGS_ACCEPTED += "NXP_EULA_v57 NXP_EULA_v58"
